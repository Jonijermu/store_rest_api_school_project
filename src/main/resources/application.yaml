spring:
  config:
    import: optional:file:env.properties
  application:
    name: store_rest_api_school_project

  datasource:
    url: jdbc:mariadb://localhost:3306/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql:
      true
  sql:
    init:
      mode: always

